version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./portfolio-backend
      dockerfile: Dockerfile
    container_name: portfolio-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/portfolio
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgrespassword
      JWT_SECRET: yourSecretKeyShouldBeAtLeast256BitsLongToSupportHMACSHA256AuthenticationInSpringSecurity
      JWT_EXPIRATION: 86400000

volumes:
  pgdata:
